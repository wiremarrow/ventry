# Minimal Docker Compose for development (optional services only)
version: '3.8'

services:
  # Redis is optional for development
  # Uncomment if you need real-time features or caching
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis_data:/data

  # PostgreSQL is optional for development
  # Use this if you prefer PostgreSQL over SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ventry
  #     POSTGRES_PASSWORD: ventry_dev_password
  #     POSTGRES_DB: ventry_dev
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local